<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${oaspete.id != null} ? 'Editeaza Oaspete' : 'Oaspete Nou'">Oaspete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0" th:text="${oaspete.id != null} ? 'Editeaza oaspete' : 'Oaspete nou'"></h4>
                </div>
                <div class="card-body">
                    <form th:action="${oaspete.id != null} ? @{/oaspeti/{id}/edit(id=${oaspete.id})} : @{/oaspeti/nou}"
                          th:object="${oaspete}" method="post" class="needs-validation" novalidate>

                        <div class="mb-3">
                            <label class="form-label">Nume complet <span class="text-danger">*</span></label>
                            <input type="text" class="form-control"
                                   th:field="*{nume}"
                                   th:classappend="${#fields.hasErrors('nume')} ? 'is-invalid'"
                                   required>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('nume')}" th:errors="*{nume}">Eroare</div>
                            <div class="invalid-feedback" th:unless="${#fields.hasErrors('nume')}">Numele este obligatoriu.</div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Telefon</label>
                                <input type="tel" class="form-control"
                                       th:field="*{telefon}"
                                       th:classappend="${#fields.hasErrors('telefon')} ? 'is-invalid'"
                                       pattern="^[+]?[0-9]{3,16}$"
                                       placeholder="+40721123456">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('telefon')}" th:errors="*{telefon}">Eroare</div>
                                <div class="invalid-feedback" th:unless="${#fields.hasErrors('telefon')}">Format invalid (ex: +40721123456).</div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">CNP</label>
                                <input type="text" class="form-control"
                                       th:field="*{cnp}"
                                       th:classappend="${#fields.hasErrors('cnp')} ? 'is-invalid'"
                                       maxlength="13" pattern="[0-9]{13}">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('cnp')}" th:errors="*{cnp}">Eroare</div>
                                <div class="invalid-feedback" th:unless="${#fields.hasErrors('cnp')}">CNP trebuie sa contina 13 cifre.</div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Data nastere</label>
                            <input type="date" class="form-control" th:field="*{dataNastere}">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Salveaza</button>
                            <a th:href="@{/oaspeti}" class="btn btn-outline-secondary">Anuleaza</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
