<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${factura.id != null} ? 'Editeaza Factura' : 'Factura Noua'">Factura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0" th:text="${factura.id != null} ? 'Editeaza factura' : 'Factura noua'"></h4>
                </div>
                <div class="card-body">
                    <div th:replace="~{fragments/messages :: messages}"></div>
                    <form th:action="${factura.id != null} ? @{/facturi/{id}/edit(id=${factura.id})} : @{/facturi/nou}"
                          th:object="${factura}" method="post" class="needs-validation" novalidate>

                        <div class="mb-3">
                            <label class="form-label">Rezervare <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{rezervare.id}" required>
                                <option value="">-- Selectati rezervarea --</option>
                                <option th:each="r : ${rezervari}"
                                        th:value="${r.id}"
                                        th:text="'#' + ${r.id} + ' - ' + ${r.oaspete.nume} + ' (' + ${r.hotel.nume} + ')'">
                                </option>
                            </select>
                            <div class="invalid-feedback">Selectati o rezervare.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Numar factura <span class="text-danger">*</span></label>
                            <input type="text" class="form-control"
                                   th:field="*{numarFactura}"
                                   th:classappend="${#fields.hasErrors('numarFactura')} ? 'is-invalid'"
                                   required>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('numarFactura')}" th:errors="*{numarFactura}">Eroare</div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Suma camera (RON)</label>
                                <input type="number" class="form-control" th:field="*{sumaCamera}"
                                       min="0" step="0.01">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Suma servicii (RON)</label>
                                <input type="number" class="form-control" th:field="*{sumaServicii}"
                                       min="0" step="0.01">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Total (RON) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control"
                                       th:field="*{sumaTotal}"
                                       th:classappend="${#fields.hasErrors('sumaTotal')} ? 'is-invalid'"
                                       min="0" step="0.01" required>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('sumaTotal')}" th:errors="*{sumaTotal}">Eroare</div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Scadenta</label>
                                <input type="date" class="form-control" th:field="*{scadenta}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Status plata</label>
                                <select class="form-select" th:field="*{statusPlata}">
                                    <option th:each="s : ${statusuri}"
                                            th:value="${s}" th:text="${s}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Salveaza</button>
                            <a th:href="@{/facturi}" class="btn btn-outline-secondary">Anuleaza</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
