<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="pagination(page, baseUrl)">
    <div class="d-flex justify-content-between align-items-center mt-3 mb-2">
        <small class="text-muted"
               th:text="'Afisare ' + (${page.totalElements == 0} ? 0 : (${page.number} * ${page.size} + 1))
                        + ' - ' + (${page.number} * ${page.size} + ${page.numberOfElements})
                        + ' din ' + ${page.totalElements} + ' inregistrari'">
        </small>
        <div class="d-flex align-items-center gap-2">
            <label class="form-label mb-0 text-muted small">Pe pagina:</label>
            <select class="form-select form-select-sm" style="width:auto"
                    id="pageSizeSelect"
                    th:attr="data-base-url=${baseUrl},data-sort-by=${sortBy},data-sort-dir=${sortDir}">
                <option th:each="s : ${#numbers.sequence(5, 25, 5)}"
                        th:value="${s}" th:text="${s}"
                        th:selected="${s == page.size}">
                </option>
            </select>
        </div>
    </div>

    <nav th:if="${page.totalPages > 1}">
        <ul class="pagination justify-content-center flex-wrap">
            <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{${baseUrl}(page=0, size=${page.size}, sortBy=${sortBy}, sortDir=${sortDir})}">
                    &laquo;
                </a>
            </li>
            <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{${baseUrl}(page=${page.number - 1}, size=${page.size}, sortBy=${sortBy}, sortDir=${sortDir})}">
                    &lsaquo;
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(
                    (${page.number} > 2 ? ${page.number} - 2 : 0),
                    (${page.number} + 2 < ${page.totalPages} - 1 ? ${page.number} + 2 : ${page.totalPages} - 1))}"
                class="page-item" th:classappend="${i == page.number} ? 'active'">
                <a class="page-link"
                   th:href="@{${baseUrl}(page=${i}, size=${page.size}, sortBy=${sortBy}, sortDir=${sortDir})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{${baseUrl}(page=${page.number + 1}, size=${page.size}, sortBy=${sortBy}, sortDir=${sortDir})}">
                    &rsaquo;
                </a>
            </li>
            <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{${baseUrl}(page=${page.totalPages - 1}, size=${page.size}, sortBy=${sortBy}, sortDir=${sortDir})}">
                    &raquo;
                </a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
