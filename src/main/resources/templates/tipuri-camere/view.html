<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${tipCamera.nume} + ' - Detalii'">Tip Camera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="${tipCamera.nume}">Tip Camera</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/tipuri-camere/{id}/edit(id=${tipCamera.id})}" class="btn btn-outline-warning">Editeaza</a>
            <a th:href="@{/tipuri-camere}" class="btn btn-outline-secondary">Inapoi</a>
        </div>
    </div>

    <div class="card shadow-sm" style="max-width:500px">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-5">ID</dt>
                <dd class="col-sm-7" th:text="${tipCamera.id}"></dd>

                <dt class="col-sm-5">Nume</dt>
                <dd class="col-sm-7" th:text="${tipCamera.nume}"></dd>

                <dt class="col-sm-5">Hotel</dt>
                <dd class="col-sm-7">
                    <a th:href="@{/hoteluri/{id}(id=${tipCamera.hotel.id})}" th:text="${tipCamera.hotel.nume}"></a>
                </dd>

                <dt class="col-sm-5">Pret/noapte</dt>
                <dd class="col-sm-7" th:text="${tipCamera.pret} + ' RON'"></dd>

                <dt class="col-sm-5">Capacitate</dt>
                <dd class="col-sm-7" th:text="${tipCamera.capacitate} + ' persoane'"></dd>

                <dt class="col-sm-5">Descriere</dt>
                <dd class="col-sm-7" th:text="${tipCamera.descriere} ?: '-'"></dd>
            </dl>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
