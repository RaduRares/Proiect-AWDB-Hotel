<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Angajati - Hotel Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div th:replace="~{fragments/messages :: messages}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Angajati</h2>
        <a th:href="@{/angajati/nou}" class="btn btn-primary">+ Angajat nou</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>
                        <a th:href="@{/angajati(page=${page.number}, size=${page.size},
                            sortBy='nume_prenume', sortDir=${sortBy == 'nume_prenume' && sortDir == 'asc'} ? 'desc' : 'asc')}"
                           class="text-white text-decoration-none">
                            Nume <span th:if="${sortBy == 'nume_prenume'}" th:text="${sortDir == 'asc'} ? '▲' : '▼'"></span>
                        </a>
                    </th>
                    <th>Functie</th>
                    <th>
                        <a th:href="@{/angajati(page=${page.number}, size=${page.size},
                            sortBy='salariu', sortDir=${sortBy == 'salariu' && sortDir == 'asc'} ? 'desc' : 'asc')}"
                           class="text-white text-decoration-none">
                            Salariu <span th:if="${sortBy == 'salariu'}" th:text="${sortDir == 'asc'} ? '▲' : '▼'"></span>
                        </a>
                    </th>
                    <th>Hotel</th>
                    <th>Status</th>
                    <th>Actiuni</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${page.totalElements == 0}">
                    <td colspan="7" class="text-center text-muted py-4">Nu exista angajati inregistrati.</td>
                </tr>
                <tr th:each="a : ${page.content}">
                    <td th:text="${a.id}"></td>
                    <td th:text="${a.nume_prenume}"></td>
                    <td th:text="${a.functie}"></td>
                    <td th:text="${a.salariu} + ' RON'"></td>
                    <td th:text="${a.hotel.nume}"></td>
                    <td>
                        <span th:if="${a.activ_munca}" class="badge bg-success">Activ</span>
                        <span th:unless="${a.activ_munca}" class="badge bg-secondary">Inactiv</span>
                    </td>
                    <td>
                        <a th:href="@{/angajati/{id}(id=${a.id})}" class="btn btn-sm btn-outline-info me-1">Detalii</a>
                        <a th:href="@{/angajati/{id}/edit(id=${a.id})}" class="btn btn-sm btn-outline-warning me-1">Editeaza</a>
                        <button type="button" class="btn btn-sm btn-outline-danger"
                                data-bs-toggle="modal" th:data-bs-target="'#del' + ${a.id}">Sterge</button>
                        <div class="modal fade" th:id="'del' + ${a.id}" tabindex="-1">
                            <div class="modal-dialog"><div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title">Confirmare stergere</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">Stergeti angajatul <strong th:text="${a.nume_prenume}"></strong>?</div>
                                <div class="modal-footer">
                                    <button class="btn btn-secondary" data-bs-dismiss="modal">Anuleaza</button>
                                    <form th:action="@{/angajati/{id}/delete(id=${a.id})}" method="post">
                                        <button type="submit" class="btn btn-danger">Sterge</button>
                                    </form>
                                </div>
                            </div></div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:replace="~{fragments/pagination :: pagination(${page}, '/angajati')}"></div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
