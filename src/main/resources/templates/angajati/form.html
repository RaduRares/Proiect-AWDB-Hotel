<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${angajat.id != null} ? 'Editeaza Angajat' : 'Angajat Nou'">Angajat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0" th:text="${angajat.id != null} ? 'Editeaza angajat' : 'Angajat nou'"></h4>
                </div>
                <div class="card-body">
                    <form th:action="${angajat.id != null} ? @{/angajati/{id}/edit(id=${angajat.id})} : @{/angajati/nou}"
                          th:object="${angajat}" method="post" class="needs-validation" novalidate>

                        <div class="mb-3">
                            <label class="form-label">Nume si prenume <span class="text-danger">*</span></label>
                            <input type="text" class="form-control"
                                   th:field="*{nume_prenume}"
                                   th:classappend="${#fields.hasErrors('nume_prenume')} ? 'is-invalid'"
                                   required>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('nume_prenume')}" th:errors="*{nume_prenume}">Eroare</div>
                            <div class="invalid-feedback" th:unless="${#fields.hasErrors('nume_prenume')}">Numele este obligatoriu.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Functie <span class="text-danger">*</span></label>
                            <input type="text" class="form-control"
                                   th:field="*{functie}"
                                   th:classappend="${#fields.hasErrors('functie')} ? 'is-invalid'"
                                   required>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('functie')}" th:errors="*{functie}">Eroare</div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Salariu (RON) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control"
                                       th:field="*{salariu}"
                                       th:classappend="${#fields.hasErrors('salariu')} ? 'is-invalid'"
                                       min="0" step="0.01" required>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('salariu')}" th:errors="*{salariu}">Eroare</div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Data angajare <span class="text-danger">*</span></label>
                                <input type="date" class="form-control"
                                       th:field="*{data_angajare}"
                                       th:classappend="${#fields.hasErrors('data_angajare')} ? 'is-invalid'"
                                       required>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('data_angajare')}" th:errors="*{data_angajare}">Eroare</div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Hotel <span class="text-danger">*</span></label>
                            <select class="form-select"
                                    th:field="*{hotel.id}"
                                    th:classappend="${#fields.hasErrors('hotel')} ? 'is-invalid'"
                                    required>
                                <option value="">-- Selectati hotelul --</option>
                                <option th:each="h : ${hoteluri}"
                                        th:value="${h.id}" th:text="${h.nume} + ' (' + ${h.oras} + ')'">
                                </option>
                            </select>
                            <div class="invalid-feedback">Selectati un hotel.</div>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input"
                                   th:field="*{activ_munca}" id="activ">
                            <label class="form-check-label" for="activ">Angajat activ</label>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Salveaza</button>
                            <a th:href="@{/angajati}" class="btn btn-outline-secondary">Anuleaza</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
