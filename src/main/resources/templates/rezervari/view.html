<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'Rezervare #' + ${rezervare.id} + ' - Detalii'">Rezervare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div th:replace="~{fragments/messages :: messages}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="'Rezervare #' + ${rezervare.id}">Rezervare</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/rezervari/{id}/edit(id=${rezervare.id})}" class="btn btn-outline-warning">Editeaza</a>
            <a th:href="@{/rezervari}" class="btn btn-outline-secondary">Inapoi</a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-5">
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-white"><h5 class="mb-0">Detalii rezervare</h5></div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-5">Oaspete</dt>
                        <dd class="col-sm-7">
                            <a th:href="@{/oaspeti/{id}(id=${rezervare.oaspete.id})}"
                               th:text="${rezervare.oaspete.nume}"></a>
                        </dd>

                        <dt class="col-sm-5">Hotel</dt>
                        <dd class="col-sm-7">
                            <a th:href="@{/hoteluri/{id}(id=${rezervare.hotel.id})}"
                               th:text="${rezervare.hotel.nume}"></a>
                        </dd>

                        <dt class="col-sm-5">Tip camera</dt>
                        <dd class="col-sm-7" th:text="${rezervare.tipCamera.nume}"></dd>

                        <dt class="col-sm-5">Check-out</dt>
                        <dd class="col-sm-7" th:text="${rezervare.checkOut}"></dd>

                        <dt class="col-sm-5">Nr. persoane</dt>
                        <dd class="col-sm-7" th:text="${rezervare.nrPersoane}"></dd>

                        <dt class="col-sm-5">Status</dt>
                        <dd class="col-sm-7">
                            <span class="badge"
                                  th:classappend="${rezervare.status.name() == 'CONFIRMATA'} ? 'bg-success' :
                                                 (${rezervare.status.name() == 'ANULATA'} ? 'bg-danger' :
                                                 (${rezervare.status.name() == 'CHECKED_IN'} ? 'bg-primary' :
                                                 (${rezervare.status.name() == 'CHECKED_OUT'} ? 'bg-info' : 'bg-warning')))"
                                  th:text="${rezervare.status}"></span>
                        </dd>

                        <dt class="col-sm-5">Creat la</dt>
                        <dd class="col-sm-7" th:text="${rezervare.creatLa}"></dd>

                        <dt class="col-sm-5" th:if="${rezervare.observatii}">Observatii</dt>
                        <dd class="col-sm-7" th:if="${rezervare.observatii}" th:text="${rezervare.observatii}"></dd>
                    </dl>
                </div>
            </div>

            <!-- Factura -->
            <div class="card shadow-sm" th:if="${rezervare.factura != null}">
                <div class="card-header bg-white"><h5 class="mb-0">Factura</h5></div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-5">Nr. factura</dt>
                        <dd class="col-sm-7">
                            <a th:href="@{/facturi/{id}(id=${rezervare.factura.id})}"
                               th:text="${rezervare.factura.numarFactura}"></a>
                        </dd>

                        <dt class="col-sm-5">Total</dt>
                        <dd class="col-sm-7" th:text="${rezervare.factura.sumaTotal} + ' RON'"></dd>

                        <dt class="col-sm-5">Status</dt>
                        <dd class="col-sm-7">
                            <span class="badge"
                                  th:classappend="${rezervare.factura.statusPlata.name() == 'PLATITA'} ? 'bg-success' :
                                                 (${rezervare.factura.statusPlata.name() == 'ANULATA'} ? 'bg-danger' : 'bg-warning')"
                                  th:text="${rezervare.factura.statusPlata}"></span>
                        </dd>
                    </dl>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Servicii adaugate</h5>
                    <a th:href="@{/rezervari/{id}/servicii/nou(id=${rezervare.id})}"
                       class="btn btn-sm btn-outline-primary">+ Adauga serviciu</a>
                </div>
                <div class="card-body p-0">
                    <table class="table table-sm mb-0">
                        <thead class="table-light">
                        <tr><th>Serviciu</th><th>Cantitate</th><th>Data</th><th></th></tr>
                        </thead>
                        <tbody>
                        <tr th:if="${rezervare.rezervariServicii.isEmpty()}">
                            <td colspan="4" class="text-muted text-center py-2">Nu exista servicii adaugate.</td>
                        </tr>
                        <tr th:each="rs : ${rezervare.rezervariServicii}">
                            <td th:text="${rs.serviciu.nume}"></td>
                            <td th:text="${rs.cantitate}"></td>
                            <td th:text="${rs.dataFolosinta} ?: '-'"></td>
                            <td>
                                <form th:action="@{/rezervari/{rId}/servicii/{id}/delete(rId=${rezervare.id}, id=${rs.id})}"
                                      method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-link text-danger p-0">Sterge</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
