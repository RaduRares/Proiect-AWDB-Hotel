<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${serviciu.nume} + ' - Detalii'">Serviciu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="${serviciu.nume}">Serviciu</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/servicii/{id}/edit(id=${serviciu.id})}" class="btn btn-outline-warning">Editeaza</a>
            <a th:href="@{/servicii}" class="btn btn-outline-secondary">Inapoi</a>
        </div>
    </div>

    <div class="card shadow-sm" style="max-width:450px">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-4">Nume</dt>
                <dd class="col-sm-8" th:text="${serviciu.nume}"></dd>

                <dt class="col-sm-4">Cost</dt>
                <dd class="col-sm-8" th:text="${serviciu.cost} + ' RON'"></dd>

                <dt class="col-sm-4">Descriere</dt>
                <dd class="col-sm-8" th:text="${serviciu.descriere} ?: '-'"></dd>

                <dt class="col-sm-4">Status</dt>
                <dd class="col-sm-8">
                    <span th:if="${serviciu.activ}" class="badge bg-success">Activ</span>
                    <span th:unless="${serviciu.activ}" class="badge bg-secondary">Inactiv</span>
                </dd>
            </dl>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
