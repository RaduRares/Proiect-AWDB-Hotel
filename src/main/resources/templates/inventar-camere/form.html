<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${entry.id != null} ? 'Editeaza Inventar' : 'Adauga in Inventar'">Inventar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0" th:text="${entry.id != null} ? 'Editeaza inventar' : 'Adauga in inventar'"></h4>
                </div>
                <div class="card-body">
                    <form th:action="${entry.id != null} ? @{/inventar-camere/{id}/edit(id=${entry.id})} : @{/inventar-camere/nou}"
                          th:object="${entry}" method="post" class="needs-validation" novalidate>

                        <div class="mb-3">
                            <label class="form-label">Hotel <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{hotel.id}" required>
                                <option value="">-- Selectati hotelul --</option>
                                <option th:each="h : ${hoteluri}"
                                        th:value="${h.id}" th:text="${h.nume}">
                                </option>
                            </select>
                            <div class="invalid-feedback">Selectati un hotel.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tip Camera <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{tipCamera.id}" required>
                                <option value="">-- Selectati tipul camerei --</option>
                                <option th:each="tc : ${tipuriCamere}"
                                        th:value="${tc.id}"
                                        th:text="${tc.hotel.nume} + ' - ' + ${tc.nume}">
                                </option>
                            </select>
                            <div class="invalid-feedback">Selectati un tip de camera.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Numar total camere</label>
                            <input type="number" class="form-control"
                                   th:field="*{numarTotal}"
                                   th:classappend="${#fields.hasErrors('numarTotal')} ? 'is-invalid'"
                                   min="0" value="0">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('numarTotal')}" th:errors="*{numarTotal}">Eroare</div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Salveaza</button>
                            <a th:href="@{/inventar-camere}" class="btn btn-outline-secondary">Anuleaza</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
