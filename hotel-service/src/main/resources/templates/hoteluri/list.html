<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hoteluri - Hotel Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div th:replace="~{fragments/messages :: messages}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Hoteluri</h2>
        <a th:href="@{/hoteluri/nou}" class="btn btn-primary">+ Hotel nou</a>
    </div>

    <!-- Search -->
    <form th:action="@{/hoteluri}" method="get" class="mb-3 d-flex gap-2">
        <input type="text" class="form-control" name="search" placeholder="Cauta dupa nume..."
               th:value="${search}" style="max-width:300px">
        <input type="hidden" name="size" th:value="${page.size}">
        <button type="submit" class="btn btn-outline-secondary">Cauta</button>
        <a th:href="@{/hoteluri}" class="btn btn-outline-secondary" th:if="${search}">Sterge filtru</a>
    </form>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>
                        <a th:href="@{/hoteluri(page=${page.number}, size=${page.size},
                            sortBy='id', sortDir=${sortBy == 'id' && sortDir == 'asc'} ? 'desc' : 'asc',
                            search=${search})}" class="text-white text-decoration-none">
                            #
                            <span th:if="${sortBy == 'id'}" th:text="${sortDir == 'asc'} ? '▲' : '▼'"></span>
                        </a>
                    </th>
                    <th>
                        <a th:href="@{/hoteluri(page=${page.number}, size=${page.size},
                            sortBy='nume', sortDir=${sortBy == 'nume' && sortDir == 'asc'} ? 'desc' : 'asc',
                            search=${search})}" class="text-white text-decoration-none">
                            Nume
                            <span th:if="${sortBy == 'nume'}" th:text="${sortDir == 'asc'} ? '▲' : '▼'"></span>
                        </a>
                    </th>
                    <th>
                        <a th:href="@{/hoteluri(page=${page.number}, size=${page.size},
                            sortBy='stele', sortDir=${sortBy == 'stele' && sortDir == 'asc'} ? 'desc' : 'asc',
                            search=${search})}" class="text-white text-decoration-none">
                            Stele
                            <span th:if="${sortBy == 'stele'}" th:text="${sortDir == 'asc'} ? '▲' : '▼'"></span>
                        </a>
                    </th>
                    <th>
                        <a th:href="@{/hoteluri(page=${page.number}, size=${page.size},
                            sortBy='oras', sortDir=${sortBy == 'oras' && sortDir == 'asc'} ? 'desc' : 'asc',
                            search=${search})}" class="text-white text-decoration-none">
                            Oras
                            <span th:if="${sortBy == 'oras'}" th:text="${sortDir == 'asc'} ? '▲' : '▼'"></span>
                        </a>
                    </th>
                    <th>Adresa</th>
                    <th>Actiuni</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${page.totalElements == 0}">
                    <td colspan="6" class="text-center text-muted py-4">Nu exista hoteluri inregistrate.</td>
                </tr>
                <tr th:each="hotel : ${page.content}">
                    <td th:text="${hotel.id}"></td>
                    <td th:text="${hotel.nume}"></td>
                    <td>
                        <span th:each="i : ${#numbers.sequence(1, hotel.stele)}">&#9733;</span>
                    </td>
                    <td th:text="${hotel.oras}"></td>
                    <td th:text="${hotel.adresa}"></td>
                    <td>
                        <a th:href="@{/hoteluri/{id}(id=${hotel.id})}" class="btn btn-sm btn-outline-info me-1">Detalii</a>
                        <a th:href="@{/hoteluri/{id}/edit(id=${hotel.id})}" class="btn btn-sm btn-outline-warning me-1">Editeaza</a>
                        <button type="button" class="btn btn-sm btn-outline-danger"
                                data-bs-toggle="modal" th:data-bs-target="'#deleteModal' + ${hotel.id}">Sterge</button>

                        <!-- Delete Modal -->
                        <div class="modal fade" th:id="'deleteModal' + ${hotel.id}" tabindex="-1">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h5 class="modal-title">Confirmare stergere</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                    </div>
                                    <div class="modal-body">
                                        Sigur doriti sa stergeti hotelul <strong th:text="${hotel.nume}"></strong>?
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Anuleaza</button>
                                        <form th:action="@{/hoteluri/{id}/delete(id=${hotel.id})}" method="post">
                                            <button type="submit" class="btn btn-danger">Sterge</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:replace="~{fragments/pagination :: pagination(${page}, '/hoteluri')}"></div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
