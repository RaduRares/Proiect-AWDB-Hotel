<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${hotel.nume} + ' - Detalii'">Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div th:replace="~{fragments/messages :: messages}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="${hotel.nume}">Hotel</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/hoteluri/{id}/edit(id=${hotel.id})}" class="btn btn-outline-warning">Editeaza</a>
            <a th:href="@{/hoteluri}" class="btn btn-outline-secondary">Inapoi</a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-5">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-white"><h5 class="mb-0">Informatii generale</h5></div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-5">ID</dt>
                        <dd class="col-sm-7" th:text="${hotel.id}"></dd>

                        <dt class="col-sm-5">Nume</dt>
                        <dd class="col-sm-7" th:text="${hotel.nume}"></dd>

                        <dt class="col-sm-5">Stele</dt>
                        <dd class="col-sm-7">
                            <span th:each="i : ${#numbers.sequence(1, hotel.stele)}">&#9733;</span>
                        </dd>

                        <dt class="col-sm-5">Oras</dt>
                        <dd class="col-sm-7" th:text="${hotel.oras}"></dd>

                        <dt class="col-sm-5">Adresa</dt>
                        <dd class="col-sm-7" th:text="${hotel.adresa}"></dd>

                        <dt class="col-sm-5">Telefon</dt>
                        <dd class="col-sm-7" th:text="${hotel.telefon_rezervari} ?: '-'"></dd>

                        <dt class="col-sm-5">Email</dt>
                        <dd class="col-sm-7" th:text="${hotel.email_rezervari} ?: '-'"></dd>
                    </dl>
                </div>
            </div>
        </div>
        <div class="col-md-7">
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Tipuri camere</h5>
                    <a th:href="@{/tipuri-camere/nou(hotelId=${hotel.id})}" class="btn btn-sm btn-outline-primary">+ Adauga</a>
                </div>
                <div class="card-body p-0">
                    <table class="table table-sm mb-0">
                        <thead class="table-light">
                        <tr><th>Nume</th><th>Pret/noapte</th><th>Capacitate</th></tr>
                        </thead>
                        <tbody>
                        <tr th:if="${hotel.listaTipuriCamere.isEmpty()}">
                            <td colspan="3" class="text-muted text-center py-2">Nu exista tipuri de camere.</td>
                        </tr>
                        <tr th:each="tc : ${hotel.listaTipuriCamere}">
                            <td th:text="${tc.nume}"></td>
                            <td th:text="${tc.pret} + ' RON'"></td>
                            <td th:text="${tc.capacitate} + ' pers.'"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Angajati</h5>
                    <a th:href="@{/angajati/nou(hotelId=${hotel.id})}" class="btn btn-sm btn-outline-primary">+ Adauga</a>
                </div>
                <div class="card-body p-0">
                    <table class="table table-sm mb-0">
                        <thead class="table-light">
                        <tr><th>Nume</th><th>Functie</th><th>Activ</th></tr>
                        </thead>
                        <tbody>
                        <tr th:if="${hotel.angajati.isEmpty()}">
                            <td colspan="3" class="text-muted text-center py-2">Nu exista angajati.</td>
                        </tr>
                        <tr th:each="a : ${hotel.angajati}">
                            <td th:text="${a.nume_prenume}"></td>
                            <td th:text="${a.functie}"></td>
                            <td>
                                <span th:if="${a.activ_munca}" class="badge bg-success">Activ</span>
                                <span th:unless="${a.activ_munca}" class="badge bg-secondary">Inactiv</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
