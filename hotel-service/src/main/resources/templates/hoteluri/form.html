<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${hotel.id != null} ? 'Editeaza Hotel' : 'Hotel nou'">Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0" th:text="${hotel.id != null} ? 'Editeaza hotel' : 'Adauga hotel nou'"></h4>
                </div>
                <div class="card-body">
                    <form th:action="${hotel.id != null} ? @{/hoteluri/{id}/edit(id=${hotel.id})} : @{/hoteluri/nou}"
                          th:object="${hotel}" method="post" class="needs-validation" novalidate>

                        <div class="mb-3">
                            <label class="form-label">Nume hotel <span class="text-danger">*</span></label>
                            <input type="text" class="form-control"
                                   th:field="*{nume}"
                                   th:classappend="${#fields.hasErrors('nume')} ? 'is-invalid'"
                                   required maxlength="200">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('nume')}" th:errors="*{nume}">Eroare</div>
                            <div class="invalid-feedback" th:unless="${#fields.hasErrors('nume')}">
                                Numele hotelului este obligatoriu.
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Stele <span class="text-danger">*</span></label>
                                <select class="form-select"
                                        th:field="*{stele}"
                                        th:classappend="${#fields.hasErrors('stele')} ? 'is-invalid'"
                                        required>
                                    <option value="">-- Selectati --</option>
                                    <option th:each="i : ${#numbers.sequence(1, 5)}"
                                            th:value="${i}" th:text="${i} + ' stele'">
                                    </option>
                                </select>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('stele')}" th:errors="*{stele}">Eroare</div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Oras <span class="text-danger">*</span></label>
                                <input type="text" class="form-control"
                                       th:field="*{oras}"
                                       th:classappend="${#fields.hasErrors('oras')} ? 'is-invalid'"
                                       required>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('oras')}" th:errors="*{oras}">Eroare</div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Adresa <span class="text-danger">*</span></label>
                            <input type="text" class="form-control"
                                   th:field="*{adresa}"
                                   th:classappend="${#fields.hasErrors('adresa')} ? 'is-invalid'"
                                   required>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('adresa')}" th:errors="*{adresa}">Eroare</div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Telefon rezervari</label>
                                <input type="tel" class="form-control"
                                       th:field="*{telefon_rezervari}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email rezervari</label>
                                <input type="email" class="form-control"
                                       th:field="*{email_rezervari}">
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Salveaza</button>
                            <a th:href="@{/hoteluri}" class="btn btn-outline-secondary">Anuleaza</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
