<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oaspeti - Hotel Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div th:replace="~{fragments/messages :: messages}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Oaspeti</h2>
        <a th:href="@{/oaspeti/nou}" class="btn btn-primary">+ Oaspete nou</a>
    </div>

    <form th:action="@{/oaspeti}" method="get" class="mb-3 d-flex gap-2">
        <input type="text" class="form-control" name="search" placeholder="Cauta dupa nume..."
               th:value="${search}" style="max-width:300px">
        <input type="hidden" name="size" th:value="${page.size}">
        <button type="submit" class="btn btn-outline-secondary">Cauta</button>
        <a th:href="@{/oaspeti}" class="btn btn-outline-secondary" th:if="${search}">Sterge filtru</a>
    </form>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>
                        <a th:href="@{/oaspeti(page=${page.number}, size=${page.size},
                            sortBy='nume', sortDir=${sortBy == 'nume' && sortDir == 'asc'} ? 'desc' : 'asc',
                            search=${search})}" class="text-white text-decoration-none">
                            Nume <span th:if="${sortBy == 'nume'}" th:text="${sortDir == 'asc'} ? '▲' : '▼'"></span>
                        </a>
                    </th>
                    <th>Telefon</th>
                    <th>CNP</th>
                    <th>Sejur (ultima rezervare)</th>
                    <th>Actiuni</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${page.totalElements == 0}">
                    <td colspan="6" class="text-center text-muted py-4">Nu exista oaspeti inregistrati.</td>
                </tr>
                <tr th:each="o : ${page.content}">
                    <td th:text="${o.id}"></td>
                    <td th:text="${o.nume}"></td>
                    <td th:text="${o.telefon} ?: '-'"></td>
                    <td th:text="${o.cnp} ?: '-'"></td>
                    <td>
                        <th:block th:if="${!#lists.isEmpty(o.rezervari)}"
                                  th:with="rez=${o.rezervari.get(o.rezervari.size() - 1)}">
                            <span th:text="${#temporals.format(rez.checkIn,'dd.MM.yyyy')} + ' → ' + ${#temporals.format(rez.checkOut,'dd.MM.yyyy')}"></span>
                        </th:block>
                        <span th:if="${#lists.isEmpty(o.rezervari)}" class="text-muted fst-italic">fara rezervare</span>
                    </td>
                    <td>
                        <a th:href="@{/oaspeti/{id}(id=${o.id})}" class="btn btn-sm btn-outline-info me-1">Detalii</a>
                        <a th:href="@{/oaspeti/{id}/edit(id=${o.id})}" class="btn btn-sm btn-outline-warning me-1">Editeaza</a>
                        <button type="button" class="btn btn-sm btn-outline-danger"
                                data-bs-toggle="modal" th:data-bs-target="'#del' + ${o.id}">Sterge</button>
                        <div class="modal fade" th:id="'del' + ${o.id}" tabindex="-1">
                            <div class="modal-dialog"><div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title">Confirmare stergere</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">Stergeti oaspetele <strong th:text="${o.nume}"></strong>?</div>
                                <div class="modal-footer">
                                    <button class="btn btn-secondary" data-bs-dismiss="modal">Anuleaza</button>
                                    <form th:action="@{/oaspeti/{id}/delete(id=${o.id})}" method="post">
                                        <button type="submit" class="btn btn-danger">Sterge</button>
                                    </form>
                                </div>
                            </div></div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:replace="~{fragments/pagination :: pagination(${page}, '/oaspeti')}"></div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
