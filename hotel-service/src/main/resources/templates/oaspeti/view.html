<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${oaspete.nume} + ' - Detalii'">Oaspete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="${oaspete.nume}">Oaspete</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/oaspeti/{id}/edit(id=${oaspete.id})}" class="btn btn-outline-warning">Editeaza</a>
            <a th:href="@{/oaspeti}" class="btn btn-outline-secondary">Inapoi</a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white"><h5 class="mb-0">Date personale</h5></div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-5">Nume</dt>
                        <dd class="col-sm-7" th:text="${oaspete.nume}"></dd>

                        <dt class="col-sm-5">Telefon</dt>
                        <dd class="col-sm-7" th:text="${oaspete.telefon} ?: '-'"></dd>

                        <dt class="col-sm-5">CNP</dt>
                        <dd class="col-sm-7" th:text="${oaspete.cnp} ?: '-'"></dd>

                        <dt class="col-sm-5">Data nastere</dt>
                        <dd class="col-sm-7" th:text="${oaspete.dataNastere} ?: '-'"></dd>

                        <dt class="col-sm-5">Inregistrat la</dt>
                        <dd class="col-sm-7" th:text="${oaspete.dataInregistrare}"></dd>
                    </dl>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between">
                    <h5 class="mb-0">Rezervari</h5>
                    <a th:href="@{/rezervari/nou}" class="btn btn-sm btn-outline-primary">+ Rezervare noua</a>
                </div>
                <div class="card-body p-0">
                    <table class="table table-sm mb-0">
                        <thead class="table-light">
                        <tr><th>Hotel</th><th>Check-out</th><th>Status</th><th></th></tr>
                        </thead>
                        <tbody>
                        <tr th:if="${oaspete.rezervari.isEmpty()}">
                            <td colspan="4" class="text-muted text-center py-2">Nu exista rezervari.</td>
                        </tr>
                        <tr th:each="r : ${oaspete.rezervari}">
                            <td th:text="${r.hotel.nume}"></td>
                            <td th:text="${r.checkOut}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${r.status.name() == 'CONFIRMATA'} ? 'bg-success' :
                                                      (${r.status.name() == 'ANULATA'} ? 'bg-danger' : 'bg-secondary')"
                                      th:text="${r.status}"></span>
                            </td>
                            <td><a th:href="@{/rezervari/{id}(id=${r.id})}" class="btn btn-sm btn-link p-0">Detalii</a></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
