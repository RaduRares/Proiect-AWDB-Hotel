<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Servicii - Hotel Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div th:replace="~{fragments/messages :: messages}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Servicii</h2>
        <a th:href="@{/servicii/nou}" class="btn btn-primary">+ Serviciu nou</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>
                        <a th:href="@{/servicii(page=${page.number}, size=${page.size},
                            sortBy='nume', sortDir=${sortBy == 'nume' && sortDir == 'asc'} ? 'desc' : 'asc')}"
                           class="text-white text-decoration-none">
                            Nume <span th:if="${sortBy == 'nume'}" th:text="${sortDir == 'asc'} ? '▲' : '▼'"></span>
                        </a>
                    </th>
                    <th>
                        <a th:href="@{/servicii(page=${page.number}, size=${page.size},
                            sortBy='cost', sortDir=${sortBy == 'cost' && sortDir == 'asc'} ? 'desc' : 'asc')}"
                           class="text-white text-decoration-none">
                            Cost (RON) <span th:if="${sortBy == 'cost'}" th:text="${sortDir == 'asc'} ? '▲' : '▼'"></span>
                        </a>
                    </th>
                    <th>Descriere</th>
                    <th>Status</th>
                    <th>Actiuni</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${page.totalElements == 0}">
                    <td colspan="6" class="text-center text-muted py-4">Nu exista servicii.</td>
                </tr>
                <tr th:each="s : ${page.content}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.nume}"></td>
                    <td th:text="${s.cost}"></td>
                    <td th:text="${s.descriere} ?: '-'"></td>
                    <td>
                        <span th:if="${s.activ}" class="badge bg-success">Activ</span>
                        <span th:unless="${s.activ}" class="badge bg-secondary">Inactiv</span>
                    </td>
                    <td>
                        <a th:href="@{/servicii/{id}(id=${s.id})}" class="btn btn-sm btn-outline-info me-1">Detalii</a>
                        <a th:href="@{/servicii/{id}/edit(id=${s.id})}" class="btn btn-sm btn-outline-warning me-1">Editeaza</a>
                        <button type="button" class="btn btn-sm btn-outline-danger"
                                data-bs-toggle="modal" th:data-bs-target="'#del' + ${s.id}">Sterge</button>
                        <div class="modal fade" th:id="'del' + ${s.id}" tabindex="-1">
                            <div class="modal-dialog"><div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title">Confirmare stergere</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">Stergeti serviciul <strong th:text="${s.nume}"></strong>?</div>
                                <div class="modal-footer">
                                    <button class="btn btn-secondary" data-bs-dismiss="modal">Anuleaza</button>
                                    <form th:action="@{/servicii/{id}/delete(id=${s.id})}" method="post">
                                        <button type="submit" class="btn btn-danger">Sterge</button>
                                    </form>
                                </div>
                            </div></div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:replace="~{fragments/pagination :: pagination(${page}, '/servicii')}"></div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
