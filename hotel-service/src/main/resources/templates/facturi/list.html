<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Facturi - Hotel Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div th:replace="~{fragments/messages :: messages}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Facturi</h2>
        <span class="text-muted small">Facturile se genereaza automat la check-out</span>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Nr. Factura</th>
                    <th>Oaspete</th>
                    <th>Hotel</th>
                    <th>
                        <a th:href="@{/facturi(page=${page.number}, size=${page.size},
                            sortBy='sumaTotal', sortDir=${sortBy == 'sumaTotal' && sortDir == 'asc'} ? 'desc' : 'asc')}"
                           class="text-white text-decoration-none">
                            Total <span th:if="${sortBy == 'sumaTotal'}" th:text="${sortDir == 'asc'} ? '▲' : '▼'"></span>
                        </a>
                    </th>
                    <th>
                        <a th:href="@{/facturi(page=${page.number}, size=${page.size},
                            sortBy='emisaLa', sortDir=${sortBy == 'emisaLa' && sortDir == 'asc'} ? 'desc' : 'asc')}"
                           class="text-white text-decoration-none">
                            Emisa <span th:if="${sortBy == 'emisaLa'}" th:text="${sortDir == 'asc'} ? '▲' : '▼'"></span>
                        </a>
                    </th>
                    <th>Scadenta</th>
                    <th>Status</th>
                    <th>Actiuni</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${page.totalElements == 0}">
                    <td colspan="8" class="text-center text-muted py-4">Nu exista facturi. Efectuati check-out pentru a genera o factura.</td>
                </tr>
                <tr th:each="f : ${page.content}">
                    <td>
                        <a th:href="@{/facturi/{id}(id=${f.id})}" th:text="${f.numarFactura}"
                           class="text-decoration-none fw-bold"></a>
                    </td>
                    <td>
                        <a th:href="@{/rezervari/{id}(id=${f.rezervare.id})}"
                           th:text="${f.rezervare.oaspete != null} ? ${f.rezervare.oaspete.nume} : '-'"
                           class="text-decoration-none"></a>
                    </td>
                    <td th:text="${f.rezervare.hotel != null} ? ${f.rezervare.hotel.nume} : '-'"></td>
                    <td class="fw-bold" th:text="${f.sumaTotal} + ' RON'"></td>
                    <td th:text="${#temporals.format(f.emisaLa, 'dd.MM.yyyy HH:mm')}"></td>
                    <td th:text="${f.scadenta != null} ? ${#temporals.format(f.scadenta, 'dd.MM.yyyy')} : '-'"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${f.statusPlata.name() == 'PLATITA'} ? 'bg-success' :
                                             (${f.statusPlata.name() == 'ANULATA'} ? 'bg-danger' : 'bg-warning text-dark')"
                              th:text="${f.statusPlata}"></span>
                    </td>
                    <td class="text-nowrap">
                        <form th:if="${f.statusPlata.name() == 'NEPLATITA'}"
                              th:action="@{/facturi/{id}/marcheaza-platit(id=${f.id})}" method="post" class="d-inline me-1">
                            <button type="submit" class="btn btn-sm btn-success">Platit</button>
                        </form>
                        <a th:href="@{/facturi/{id}(id=${f.id})}" class="btn btn-sm btn-outline-info me-1">Detalii</a>
                        <button type="button" class="btn btn-sm btn-outline-danger"
                                data-bs-toggle="modal" th:data-bs-target="'#del' + ${f.id}">Sterge</button>
                        <div class="modal fade" th:id="'del' + ${f.id}" tabindex="-1">
                            <div class="modal-dialog"><div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title">Confirmare stergere</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">Stergeti factura <strong th:text="${f.numarFactura}"></strong>?</div>
                                <div class="modal-footer">
                                    <button class="btn btn-secondary" data-bs-dismiss="modal">Anuleaza</button>
                                    <form th:action="@{/facturi/{id}/delete(id=${f.id})}" method="post">
                                        <button type="submit" class="btn btn-danger">Sterge</button>
                                    </form>
                                </div>
                            </div></div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:replace="~{fragments/pagination :: pagination(${page}, '/facturi')}"></div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
