<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${factura.numarFactura} + ' - Detalii'">Factura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="'Factura ' + ${factura.numarFactura}">Factura</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/facturi/{id}/edit(id=${factura.id})}" class="btn btn-outline-warning">Editeaza</a>
            <a th:href="@{/facturi}" class="btn btn-outline-secondary">Inapoi</a>
        </div>
    </div>

    <div class="card shadow-sm" style="max-width:500px">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-5">Nr. factura</dt>
                <dd class="col-sm-7" th:text="${factura.numarFactura}"></dd>

                <dt class="col-sm-5">Rezervare</dt>
                <dd class="col-sm-7">
                    <a th:href="@{/rezervari/{id}(id=${factura.rezervare.id})}"
                       th:text="'#' + ${factura.rezervare.id}"></a>
                </dd>

                <dt class="col-sm-5">Suma camera</dt>
                <dd class="col-sm-7" th:text="${factura.sumaCamera != null} ? ${factura.sumaCamera} + ' RON' : '-'"></dd>

                <dt class="col-sm-5">Suma servicii</dt>
                <dd class="col-sm-7" th:text="${factura.sumaServicii != null} ? ${factura.sumaServicii} + ' RON' : '-'"></dd>

                <dt class="col-sm-5">Total</dt>
                <dd class="col-sm-7 fw-bold" th:text="${factura.sumaTotal} + ' RON'"></dd>

                <dt class="col-sm-5">Emisa la</dt>
                <dd class="col-sm-7" th:text="${factura.emisaLa}"></dd>

                <dt class="col-sm-5">Scadenta</dt>
                <dd class="col-sm-7" th:text="${factura.scadenta} ?: '-'"></dd>

                <dt class="col-sm-5">Status plata</dt>
                <dd class="col-sm-7">
                    <span class="badge"
                          th:classappend="${factura.statusPlata.name() == 'PLATITA'} ? 'bg-success' :
                                         (${factura.statusPlata.name() == 'ANULATA'} ? 'bg-danger' : 'bg-warning text-dark')"
                          th:text="${factura.statusPlata}"></span>
                </dd>
            </dl>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
