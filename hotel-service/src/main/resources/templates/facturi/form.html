<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${factura.id != null} ? 'Editeaza Factura' : 'Factura Noua'">Factura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0" th:text="${factura.id != null} ? 'Editeaza factura' : 'Factura noua'"></h4>
                </div>
                <div class="card-body">
                    <div th:replace="~{fragments/messages :: messages}"></div>
                    <form th:action="${factura.id != null} ? @{/facturi/{id}/edit(id=${factura.id})} : @{/facturi/nou}"
                          th:object="${factura}" method="post" class="needs-validation" novalidate>

                        <!-- Rezervare: dropdown pe create, readonly pe edit -->
                        <div class="mb-3" th:if="${factura.id == null}">
                            <label class="form-label">Rezervare <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{rezervare.id}" required>
                                <option value="">-- Selectati rezervarea --</option>
                                <option th:each="r : ${rezervari}"
                                        th:value="${r.id}"
                                        th:text="'#' + ${r.id} + ' - ' + ${r.oaspete.nume} + ' (' + ${r.hotel.nume} + ')'">
                                </option>
                            </select>
                            <div class="invalid-feedback">Selectati o rezervare.</div>
                        </div>
                        <div class="mb-3" th:if="${factura.id != null}">
                            <label class="form-label">Rezervare</label>
                            <input type="text" class="form-control bg-light"
                                   th:value="'#' + ${factura.rezervare.id} + ' - ' + ${factura.rezervare.oaspete.nume}"
                                   readonly>
                            <input type="hidden" th:field="*{rezervare.id}">
                        </div>

                        <!-- Info pe create: sumele se calculeaza automat -->
                        <div th:if="${factura.id == null}" class="alert alert-info mb-3">
                            <strong>Sumele, numarul facturii si scadenta se calculeaza automat</strong>
                            pe baza rezervarii selectate (pret camera x nopti + servicii extra).
                        </div>

                        <!-- Campuri calculate: vizibile doar pe edit -->
                        <div th:if="${factura.id != null}">
                            <div class="mb-3">
                                <label class="form-label">Numar factura</label>
                                <input type="text" class="form-control bg-light"
                                       th:field="*{numarFactura}" readonly>
                            </div>
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Suma camera (RON)</label>
                                    <input type="number" class="form-control bg-light"
                                           th:field="*{sumaCamera}" readonly>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Suma servicii (RON)</label>
                                    <input type="number" class="form-control bg-light"
                                           th:field="*{sumaServicii}" readonly>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Total (RON)</label>
                                    <input type="number" class="form-control bg-light"
                                           th:field="*{sumaTotal}" readonly>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Scadenta</label>
                                <input type="date" class="form-control bg-light"
                                       th:field="*{scadenta}" readonly>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Status plata</label>
                            <select class="form-select" th:field="*{statusPlata}">
                                <option th:each="s : ${statusuri}"
                                        th:value="${s}" th:text="${s}">
                                </option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Salveaza</button>
                            <a th:href="@{/facturi}" class="btn btn-outline-secondary">Anuleaza</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
