<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inventar Camere - Hotel Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div th:replace="~{fragments/messages :: messages}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Inventar Camere</h2>
        <a th:href="@{/inventar-camere/nou}" class="btn btn-primary">+ Adauga intrare</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Hotel</th>
                    <th>Tip Camera</th>
                    <th>Nr. Total Camere</th>
                    <th>Actiuni</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${inventar.isEmpty()}">
                    <td colspan="5" class="text-center text-muted py-4">Nu exista date in inventar.</td>
                </tr>
                <tr th:each="e : ${inventar}">
                    <td th:text="${e.id}"></td>
                    <td th:text="${e.hotel.nume}"></td>
                    <td th:text="${e.tipCamera.nume}"></td>
                    <td th:text="${e.numarTotal}"></td>
                    <td>
                        <a th:href="@{/inventar-camere/{id}/edit(id=${e.id})}" class="btn btn-sm btn-outline-warning me-1">Editeaza</a>
                        <button type="button" class="btn btn-sm btn-outline-danger"
                                data-bs-toggle="modal" th:data-bs-target="'#del' + ${e.id}">Sterge</button>
                        <div class="modal fade" th:id="'del' + ${e.id}" tabindex="-1">
                            <div class="modal-dialog"><div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title">Confirmare stergere</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">Stergeti aceasta inregistrare din inventar?</div>
                                <div class="modal-footer">
                                    <button class="btn btn-secondary" data-bs-dismiss="modal">Anuleaza</button>
                                    <form th:action="@{/inventar-camere/{id}/delete(id=${e.id})}" method="post">
                                        <button type="submit" class="btn btn-danger">Sterge</button>
                                    </form>
                                </div>
                            </div></div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
