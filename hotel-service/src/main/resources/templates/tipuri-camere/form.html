<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${tipCamera.id != null} ? 'Editeaza Tip Camera' : 'Tip Camera Nou'">Tip Camera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0" th:text="${tipCamera.id != null} ? 'Editeaza tip camera' : 'Tip camera nou'"></h4>
                </div>
                <div class="card-body">
                    <form th:action="${tipCamera.id != null} ? @{/tipuri-camere/{id}/edit(id=${tipCamera.id})} : @{/tipuri-camere/nou}"
                          th:object="${tipCamera}" method="post" class="needs-validation" novalidate>
                        <input type="hidden" name="returnHotelId" th:value="${returnHotelId}">

                        <div class="mb-3" th:if="${hotelFixat == null}">
                            <label class="form-label">Hotel <span class="text-danger">*</span></label>
                            <select class="form-select"
                                    th:field="*{hotel.id}"
                                    th:classappend="${#fields.hasErrors('hotel')} ? 'is-invalid'"
                                    required>
                                <option value="">-- Selectati hotelul --</option>
                                <option th:each="h : ${hoteluri}"
                                        th:value="${h.id}" th:text="${h.nume} + ' (' + ${h.oras} + ')'">
                                </option>
                            </select>
                            <div class="invalid-feedback">Selectati un hotel.</div>
                        </div>
                        <div class="mb-3" th:if="${hotelFixat != null}">
                            <label class="form-label">Hotel</label>
                            <input type="text" class="form-control"
                                   th:value="${hotelFixat.nume} + ' (' + ${hotelFixat.oras} + ')'"
                                   disabled>
                            <input type="hidden" th:name="hotel.id" th:value="${hotelFixat.id}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nume tip camera <span class="text-danger">*</span></label>
                            <input type="text" class="form-control"
                                   th:field="*{nume}"
                                   th:classappend="${#fields.hasErrors('nume')} ? 'is-invalid'"
                                   required>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('nume')}" th:errors="*{nume}">Eroare</div>
                            <div class="invalid-feedback" th:unless="${#fields.hasErrors('nume')}">
                                Numele este obligatoriu.
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descriere</label>
                            <textarea class="form-control" th:field="*{descriere}" rows="3" maxlength="300"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Pret/noapte (RON) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control"
                                       th:field="*{pret}"
                                       th:classappend="${#fields.hasErrors('pret')} ? 'is-invalid'"
                                       min="1" max="999999" step="0.01" required>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('pret')}" th:errors="*{pret}">Eroare</div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Capacitate (persoane) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control"
                                       th:field="*{capacitate}"
                                       th:classappend="${#fields.hasErrors('capacitate')} ? 'is-invalid'"
                                       min="1" required>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('capacitate')}" th:errors="*{capacitate}">Eroare</div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Salveaza</button>
                            <a th:href="${returnHotelId != null} ? @{/hoteluri/{id}(id=${returnHotelId})} : @{/tipuri-camere}"
                               class="btn btn-outline-secondary">Anuleaza</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
