<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Autentificare - Hotel Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Hotel Management</h2>
            </div>
            <div class="card shadow">
                <div class="card-body p-4">
                    <h5 class="card-title text-center mb-4">Autentificare</h5>

                    <div th:if="${param.error}" class="alert alert-danger">
                        Utilizator sau parola incorecta.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success">
                        V-ati deconectat cu succes.
                    </div>
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                    <form th:action="@{/login}" method="post" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label for="username" class="form-label">Utilizator</label>
                            <input type="text" class="form-control" id="username" name="username"
                                   autofocus required>
                            <div class="invalid-feedback">Introduceti numele de utilizator.</div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Parola</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                            <div class="invalid-feedback">Introduceti parola.</div>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe" name="remember-me">
                            <label class="form-check-label" for="rememberMe">Tine-ma minte (14 zile)</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Conectare</button>
                    </form>

                    <hr>
                    <p class="text-center text-muted small mb-0">
                        Nu ai cont? <a th:href="@{/register}">Inregistreaza-te</a>
                    </p>
                    <p class="text-center text-muted small mt-2 mb-0">
                        <strong>Demo:</strong> admin / admin123
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
