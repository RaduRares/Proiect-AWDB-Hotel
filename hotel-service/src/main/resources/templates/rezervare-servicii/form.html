<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Adauga Serviciu la Rezervare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0">Adauga serviciu la rezervare <span class="text-muted"
                        th:text="'#' + ${rezervareId}">#</span></h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/rezervari/{id}/servicii/nou(id=${rezervareId})}"
                          th:object="${rezervareServiciu}" method="post" class="needs-validation" novalidate>

                        <div class="mb-3">
                            <label class="form-label">Serviciu <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{serviciu.id}" required>
                                <option value="">-- Selectati serviciul --</option>
                                <option th:each="s : ${servicii}"
                                        th:value="${s.id}"
                                        th:text="${s.nume} + ' (' + ${s.cost} + ' RON)'">
                                </option>
                            </select>
                            <div class="invalid-feedback">Selectati un serviciu.</div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Cantitate <span class="text-danger">*</span></label>
                                <input type="number" class="form-control"
                                       th:field="*{cantitate}"
                                       th:classappend="${#fields.hasErrors('cantitate')} ? 'is-invalid'"
                                       min="1" value="1" required>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('cantitate')}" th:errors="*{cantitate}">Eroare</div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Data folosinta</label>
                                <input type="date" class="form-control" th:field="*{dataFolosinta}">
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Adauga</button>
                            <a th:href="@{/rezervari/{id}(id=${rezervareId})}" class="btn btn-outline-secondary">Anuleaza</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
