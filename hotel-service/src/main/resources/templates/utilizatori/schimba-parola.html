<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Schimba Parola</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0">Schimba parola — <span th:text="${user.username}"></span></h4>
                </div>
                <div class="card-body">
                    <div th:replace="~{fragments/messages :: messages}"></div>
                    <form th:action="${adminChange}
                              ? @{/utilizatori/{id}/schimba-parola(id=${user.id})}
                              : @{/utilizatori/profil/schimba-parola}"
                          method="post" class="needs-validation" novalidate>

                        <div class="mb-3">
                            <label class="form-label">Parola noua <span class="text-danger">*</span></label>
                            <input type="password" name="parolaNoua" id="parolaNoua"
                                   class="form-control" required minlength="6">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Confirmare parola <span class="text-danger">*</span></label>
                            <input type="password" name="confirmare" id="confirmare"
                                   class="form-control" required minlength="6">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Salveaza</button>
                            <a th:href="${adminChange} ? '/utilizatori' : '/'"
                               class="btn btn-outline-secondary">Anuleaza</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
