<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Utilizator Nou</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0">Utilizator nou</h4>
                </div>
                <div class="card-body">
                    <div th:replace="~{fragments/messages :: messages}"></div>
                    <form th:action="@{/utilizatori/nou}" method="post" class="needs-validation" novalidate>

                        <div class="mb-3">
                            <label class="form-label">Username <span class="text-danger">*</span></label>
                            <input type="text" name="username" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Parola <span class="text-danger">*</span></label>
                            <input type="password" name="password" class="form-control" required minlength="6">
                            <div class="form-text">Minim 6 caractere.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Rol <span class="text-danger">*</span></label>
                            <select name="numRol" class="form-select" required>
                                <option th:each="r : ${roluri}" th:value="${r.nume}" th:text="${r.nume}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Hotel asignat</label>
                            <select name="hotelId" class="form-select">
                                <option value="">— fara hotel —</option>
                                <option th:each="h : ${hoteluri}" th:value="${h.id}" th:text="${h.nume}"></option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Creeaza</button>
                            <a th:href="@{/utilizatori}" class="btn btn-outline-secondary">Anuleaza</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
