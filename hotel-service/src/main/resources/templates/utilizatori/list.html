<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestionare Utilizatori</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div th:replace="~{fragments/messages :: messages}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Utilizatori</h1>
        <a th:href="@{/utilizatori/nou}" class="btn btn-primary">+ Utilizator nou</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Rol curent</th>
                    <th>Hotel asignat</th>
                    <th>Creat la</th>
                    <th>Actiuni</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.username}"></td>
                    <td th:text="${u.email}"></td>
                    <td>
                        <span th:each="r, rStat : ${u.roluri}"
                              th:text="${r.nume + (rStat.last ? '' : ', ')}"
                              class="badge bg-secondary"></span>
                    </td>
                    <td>
                        <span th:if="${u.hotel != null}"
                              th:text="${u.hotel.nume}"
                              class="badge bg-info text-dark"></span>
                        <span th:if="${u.hotel == null}"
                              class="text-muted small">—</span>
                    </td>
                    <td th:text="${#temporals.format(u.creatLa, 'dd.MM.yyyy HH:mm')}"></td>
                    <td>
                        <!-- Schimba rol -->
                        <form th:action="@{/utilizatori/{id}/rol(id=${u.id})}" method="post" class="d-inline-flex gap-1 mb-1">
                            <select name="numRol" class="form-select form-select-sm" style="width:auto">
                                <option th:each="r : ${roluri}"
                                        th:value="${r.nume}"
                                        th:text="${r.nume}"
                                        th:selected="${u.roluri.contains(r)}"></option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-outline-primary">Rol</button>
                        </form>
                        <!-- Asigneaza hotel -->
                        <form th:action="@{/utilizatori/{id}/hotel(id=${u.id})}" method="post" class="d-inline-flex gap-1 mb-1">
                            <select name="hotelId" class="form-select form-select-sm" style="width:auto">
                                <option value="">— fara hotel —</option>
                                <option th:each="h : ${hoteluri}"
                                        th:value="${h.id}"
                                        th:text="${h.nume}"
                                        th:selected="${u.hotel != null and u.hotel.id == h.id}"></option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-outline-info">Hotel</button>
                        </form>
                        <!-- Schimba parola -->
                        <a th:href="@{/utilizatori/{id}/schimba-parola(id=${u.id})}"
                           class="btn btn-sm btn-outline-secondary ms-1">Parola</a>
                        <!-- Sterge -->
                        <form th:action="@{/utilizatori/{id}/delete(id=${u.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Stergi utilizatorul ' + /*[[${u.username}]]*/ '' + '?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger ms-1">Sterge</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="7" class="text-center text-muted py-3">Niciun utilizator gasit.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
