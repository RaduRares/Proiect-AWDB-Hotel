<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${angajat.nume_prenume} + ' - Detalii'">Angajat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="${angajat.nume_prenume}">Angajat</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/angajati/{id}/edit(id=${angajat.id})}" class="btn btn-outline-warning">Editeaza</a>
            <a th:href="@{/angajati}" class="btn btn-outline-secondary">Inapoi</a>
        </div>
    </div>

    <div class="card shadow-sm" style="max-width:500px">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-5">ID</dt>
                <dd class="col-sm-7" th:text="${angajat.id}"></dd>

                <dt class="col-sm-5">Nume</dt>
                <dd class="col-sm-7" th:text="${angajat.nume_prenume}"></dd>

                <dt class="col-sm-5">Functie</dt>
                <dd class="col-sm-7" th:text="${angajat.functie}"></dd>

                <dt class="col-sm-5">Salariu</dt>
                <dd class="col-sm-7" th:text="${angajat.salariu} + ' RON'"></dd>

                <dt class="col-sm-5">Data angajare</dt>
                <dd class="col-sm-7" th:text="${angajat.data_angajare}"></dd>

                <dt class="col-sm-5">Hotel</dt>
                <dd class="col-sm-7">
                    <a th:href="@{/hoteluri/{id}(id=${angajat.hotel.id})}" th:text="${angajat.hotel.nume}"></a>
                </dd>

                <dt class="col-sm-5">Status</dt>
                <dd class="col-sm-7">
                    <span th:if="${angajat.activ_munca}" class="badge bg-success">Activ</span>
                    <span th:unless="${angajat.activ_munca}" class="badge bg-secondary">Inactiv</span>
                </dd>
            </dl>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
