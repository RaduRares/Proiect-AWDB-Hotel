spring.application.name=hotel-service
server.port=${PORT:8082}


# Database (H2 local fallback, PostgreSQL on Railway via env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:hoteldb}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create-drop}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# Logging
logging.level.root=INFO
logging.level.com.hotel=DEBUG
logging.level.org.springframework.security=INFO

# Eureka - fully disabled in default/Railway profile
spring.cloud.discovery.enabled=false
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
