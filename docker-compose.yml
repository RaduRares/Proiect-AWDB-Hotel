version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: hotel_postgres
    environment:
      POSTGRES_DB: hotel_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ajutorparolamanagement
    ports:
      - "5432:5432"
    volumes:
      - hotel_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  hotel_postgres_data: